<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Henry Card Collection</title>

<style>
* { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  overflow-x: hidden;
}

body {
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background: #070707;
  color: #f5f1e6;
  overflow-x: hidden;
}

a { text-decoration: none; color: inherit; }

/* ===== Navbar ===== */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 28px;
  background: rgba(0,0,0,0.8);
  z-index: 1000;
}

.brand { color: gold; font-weight: bold; }

.menu { display: flex; gap: 16px; }

/* ===== Page ===== */
.page { display: none; padding-top: 80px; }
.page.active { display: block; }

/* ===== Section ===== */
.section { padding: 40px 20px; }

/* ===== Gallery ===== */
.real-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 12px;
}

.real-gallery img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
}

/* ===== Collection images ===== */
.collection-images {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.collection-images img {
  width: 80px;
  height: 110px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

/* ===== Lightbox ===== */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

.lightbox.active { display: flex; }

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 30px;
  color: white;
  background: none;
  border: none;
}

/* ===== Mobile fix ===== */
@media (max-width:640px){
  .collection-images img{
    width:65px;
    height:90px;
  }
}
</style>
</head>

<body>

<header class="topbar">
  <div class="brand">Henry Card</div>
  <nav class="menu">
    <a href="#home">Home</a>
    <a href="#pokemon">寶可夢</a>
    <a href="#sailormoon">美少女戰士</a>
    <a href="#yuyu">幽遊白書</a>
  </nav>
</header>

<main>

<!-- ===== Home ===== -->
<section id="home" class="page active">
  <div class="section">
    <h2>收藏展示</h2>

    <div class="real-gallery">
      <img src="image/yuyu/IMG_7998.jpeg">
      <img src="image/yuyu/IMG_7999.jpeg">
      <img src="image/sailor/IMG_8005.jpeg">
      <img src="image/sailor/IMG_8011.jpeg">
    </div>

  </div>
</section>

<!-- ===== Pokemon ===== -->
<section id="pokemon" class="page">
  <div class="section">
    <h2>寶可夢收藏</h2>

    <div class="collection-images">
      <img src="image/pokemon/IMG_7997.JPG">
    </div>

  </div>
</section>

<!-- ===== Sailor ===== -->
<section id="sailormoon" class="page">
  <div class="section">
    <h2>美少女戰士收藏</h2>

    <div class="collection-images">
      <img src="image/sailor/IMG_8005.jpeg">
      <img src="image/sailor/IMG_8011.jpeg">
    </div>

  </div>
</section>

<!-- ===== YuYu ===== -->
<section id="yuyu" class="page">
  <div class="section">
    <h2>幽遊白書收藏</h2>

    <div class="collection-images">
      <img src="image/yuyu/IMG_7998.jpeg">
      <img src="image/yuyu/IMG_7999.jpeg">
    </div>

  </div>
</section>

</main>

<!-- ===== Lightbox ===== -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="closeBtn">&times;</button>
  <img id="lightboxImg">
</div>

<script>
const pages = document.querySelectorAll('.page');

function showPage(){
  const hash = location.hash || "#home";
  pages.forEach(p=>p.classList.remove('active'));
  document.querySelector(hash).classList.add('active');
}
window.addEventListener('hashchange',showPage);
window.addEventListener('load',showPage);

/* Lightbox */
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');

document.querySelectorAll('img').forEach(img=>{
  img.addEventListener('click',()=>{
    lightbox.classList.add('active');
    lightboxImg.src = img.src;
  });
});

document.getElementById('closeBtn').onclick=()=>{
  lightbox.classList.remove('active');
};

lightbox.onclick=(e)=>{
  if(e.target===lightbox) lightbox.classList.remove('active');
};
</script>

</body>
</html>
